name: Deploy to GitHub Pages
 
on:
  push:
    branches:
      - main
 
jobs:
  build:
    name: CI
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run Test
        run: npm run test -- --coverage
 
      - name: Build the project
        run: npm run build
 
      - name: Publish
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
  deploy:
    name: CD
    needs: build
    runs-on: ubuntu-latest
    environment: dev
   
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
     
      - name: Deploy-Dev
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy dist/practice4/index.js --name cloudflaredevpractice --compatibility-date 2026-02-26 --compatibility-flags=nodejs_compat --assets dist/client

  deploy-prod:
    name: CD-PROD
    needs: deploy
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy-Prod
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy dist/practice4/index.js --name cloudflareprodpractice --compatibility-date 2026-02-26 --compatibility-flags=nodejs_compat --assets dist/client